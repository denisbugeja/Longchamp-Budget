<!DOCTYPE html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
        <link rel="stylesheet" href="bootstrap/bootstrap-icons.min.css" />
        <link rel="stylesheet" href="styles.min.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Budget</title>        
    </head>
    <body class="d-flex h-100 bg-white text-dark" data-controller="budget">
        <div class="cover-container d-flex w-100 h-100 mx-auto flex-column">
            <header class="bg-dark text-white px-3 py-1">
              <div class="d-flex justify-content-between">
                <nav class="nav nav-masthead">
                    <button type="button" class="btn btn-secondary m-1" data-action="click->budget#createFile" title="Créer un nouveau fichier">
                        <i class="bi bi-file-plus"></i>

                    </button>
                    <button type="button" class="btn btn-secondary m-1" data-action="click->budget#openFile" title="Ouvrir un fichier existant">
                        <i class="bi bi-folder2-open"></i>
                    </button>
                </nav>
                <nav class="nav nav-masthead">
                  <a class="nav-link active" aria-current="page" href="index.html">Budgets</a>
                  <a class="nav-link" href="#" data-action="click->budget#loadExpenses">Dépenses</a>
                  <a class="nav-link" href="#" data-action="click->budget#loadUnits">Unités</a>
                </nav>
              </div>
            </header>
            <main class="px-3 align-top" data-budget-target="main">
                <h1 class="text-center">Cover your page.</h1>
                <form action="" id="greet-form" data-action="submit->budget#formSubmit">
                    <div class="row">
                        <div class="col-10">
                            <div class="input-group">
                                <span class="input-group-text">@</span>
                                <input id="greet-input" type="text" class="form-control"  placeholder="Enter a name..." data-budget-target="textInput">
                            </div>
                        </div>
                        <div class="col-2">
                            <button type="submit" class="w-100 btn btn-primary">Greet</button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12" id="greet-msg" data-budget-target="message"></div>
                    </div>
                </form>
            </main>
            <footer class="mt-auto text-white-50">
              <p>Cover template for <a href="https://getbootstrap.com/" class="text-white">Bootstrap</a>, by <a href="https://twitter.com/mdo" class="text-white">@mdo</a>.</p>
            </footer>
        </div>
        <script src="/bootstrap/bootstrap.min.js"></script>
        <script type="module" src="/main.js"></script>
    </body>
</html>
