<div
    class="row"
    data-controller="matrix-expense-instance"
    data-matrix-expense-instance-uid-value="{{ uid_expense_instance }}"
    data-matrix-expense-instance-matrix-section-outlet="[data-matrix-section-uid-value='{{ uid_section }}']"
>
    <div data-expense-instance-id="{{ uid_expense_instance }}">
        {{ title_expense }}
    </div>
    <div class="col-3">
        Prix unitaire:<br />
        <input
            type="number"
            placeholder="{{ expenses_unit_price }}"
            value="{{ expenses_instances_unit_price }}"
            min="0"
            data-matrix-expense-instance-target="unitPrice"
            step=".01"
            data-action="change->matrix-expense-instance#updateExpenseInstance"
        />
    </div>
    <div class="col-3">
        Quantité:<br />
        <input
            type="number"
            placeholder="{{ expenses_units }}"
            value="{{ expenses_instances_units }}"
            min="0"
            data-matrix-expense-instance-target="units"
            step=".01"
            data-action="change->matrix-expense-instance#updateExpenseInstance"
        />
    </div>
    <div class="col-3">
        Ratio:<br />
        <input
            type="number"
            placeholder="{{ expenses_rate }}"
            value="{{ expenses_instances_rate }}"
            min="0"
            max="100"
            data-matrix-expense-instance-target="rate"
            step=".01"
            data-action="change->matrix-expense-instance#updateExpenseInstance"
        />
    </div>
    <div class="col-3">
        Total:<br />
        <strong>{{ total_applyed_price }}</strong>
    </div>
    <div class="w-100">
        Commentaires<br />
        <textarea
            class="w-100"
            data-action="change->matrix-expense-instance#updateExpenseInstance"
            data-matrix-expense-instance-target="comments"
        >
{{ comments }}</textarea
        >
    </div>
    <div class="w-100">
        <button
            type="button"
            class="btn btn-outline-danger text-align-center px-1"
            title="Supprimer"
            data-action="click->matrix-expense-instance#deleteExpenseInstance"
        >
            <i class="bi bi-trash"></i>
        </button>

        <button
            type="button"
            class="btn btn-outline-secondary text-align-center px-1"
            title="Dupliquer"
            data-action="click->matrix-expense-instance#copyExpenseInstance"
        >
            <i class="bi bi-copy"></i>
        </button>
    </div>
</div>
