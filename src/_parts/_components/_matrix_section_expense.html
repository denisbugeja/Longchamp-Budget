<tr
    data-controller="matrix-section-expense"
    data-matrix-section-expense-matrix-section-outlet="[data-matrix-section-uid-value='{{ uid_section }}']"
    data-matrix-section-expense-uid-section-value="{{ uid_section }}"
    data-matrix-section-expense-uid-expense-value="{{ uid_expense }}"
>
    <td
        class="cursor-pointer"
        data-action="click->matrix-section-expense#highlightExpense"
    >
        {{ title_expense }}
    </td>
    <td
        data-action="click->matrix-section-expense#highlightExpense"
        data-matrix-section-expense-target="count"
        class="cursor-pointer text-end"
    ></td>
    <td class="text-end">
        <button
            type="button"
            class="btn btn-outline-primary text-align-center p-0"
            title="Ajouter"
            data-action="click->matrix-section-expense#addExpenseInstance"
        >
            <i class="bi bi-plus p-0"></i>
        </button>
    </td>
</tr>
