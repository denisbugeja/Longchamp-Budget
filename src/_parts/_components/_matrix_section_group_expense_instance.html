<tr
    id="ref{{ uid_expense_instance_escaped }}"
    data-controller="matrix-group-expense-instance"
    data-matrix-group-expense-instance-uid-section-value="{{ uid_section }}"
    data-matrix-group-expense-instance-uid-expense-value="{{ uid_expense }}"
>
    <td>
        <a
            href="#{{ uid_expense_instance_escaped }}"
            data-action="click->matrix-group-expense-instance#clickAnchor"
            >{{ title_expense }}</a
        >
    </td>
    <td>{{ title_section }}</td>
    <td>{{ comments }}</td>
    <td>{{ group_rate }}</td>
    <td class="text-end">{{ group_applyed_unit_price }}</td>
    <td class="text-end">{{ group_applyed_total_price }}</td>
</tr>
