<div
    class="accordion-item"
    data-controller="matrix-section"
    data-matrix-section-uid-value="{{ uid }}"
    data-matrix-section-matrix-outlet="[data-controller='matrix']"
>
    <h2 class="accordion-header" id="heading-section-{{ uid }}">
        <button
            class="accordion-button"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#matrix-section-{{ uid }}"
            aria-expanded="true"
            aria-controls="matrix-section-{{ uid }}"
        >
            {{ title }}
        </button>
    </h2>
    <div
        id="matrix-section-{{ uid }}"
        class="accordion-collapse collapse show"
        aria-labelledby="heading-section-{{ uid }}"
    >
        <div class="accordion-body">
            <div class="row">
                <div
                    class="col-3 col-lg-2"
                    data-matrix-section-target="expenseList"
                ></div>
                <div class="col-9 col-lg-10">
                    <div
                        data-matrix-section-target="expenseGroupInstanceListContainer"
                        class="d-none"
                    >
                        <table
                            class="table table-striped table-hover table-bordered"
                        >
                            <thead>
                                <tr>
                                    <th>Libellé</th>
                                    <th>Section/Unité</th>
                                    <th>Commentaires</th>
                                    <th>% restant</th>
                                    <th class="text-end">
                                        Prix unitaire calculé
                                    </th>
                                    <th class="text-end">Prix Total</th>
                                </tr>
                            </thead>
                            <tbody
                                data-matrix-section-target="expenseGroupInstanceList"
                            ></tbody>
                            <tfoot
                                data-matrix-section-target="expenseGroupRatioTotal"
                            ></tfoot>
                        </table>
                    </div>
                    <div>
                        <table
                            class="table table-striped table-hover table-bordered"
                        >
                            <thead>
                                <tr>
                                    <th rowspan="2" scope="col">Libellé</th>
                                    <th rowspan="2" scope="col">
                                        Prix unitaire
                                    </th>
                                    <th scope="col">Enfants/Ados</th>
                                    <th scope="col">Chefs</th>
                                    <th rowspan="2" scope="col">%</th>
                                    <th rowspan="2" scope="col">
                                        Commentaires
                                    </th>
                                    <th
                                        rowspan="2"
                                        scope="col"
                                        class="text-end"
                                    >
                                        Total
                                    </th>
                                    <th
                                        rowspan="2"
                                        scope="col"
                                        class="text-end"
                                    >
                                        Actions
                                    </th>
                                </tr>
                                <tr>
                                    <td>
                                        <input
                                            type="number"
                                            min="0"
                                            step="1"
                                            name="section-member-count-{{ uid }}"
                                            data-matrix-section-target="sectionMembersCount"
                                            data-action="change->matrix-section#updateMembersCount"
                                        />
                                    </td>
                                    <td>
                                        <input
                                            type="number"
                                            min="0"
                                            step="1"
                                            name="section-adults-count-{{ uid }}"
                                            data-matrix-section-target="sectionAdultsCount"
                                            data-action="change->matrix-section#updateAdultsCount"
                                        />
                                    </td>
                                </tr>
                            </thead>
                            <tbody
                                data-matrix-section-target="expenseInstanceList"
                            ></tbody>
                            <tfoot>
                                <tr
                                    data-matrix-section-target="expenseInstanceTotal"
                                ></tr>
                                <tr
                                    data-matrix-section-target="expenseInstanceGroupTotal"
                                ></tr>
                                <tr
                                    data-matrix-section-target="expenseInstanceMemberTotal"
                                ></tr>
                            </tfoot>
                        </table>
                    </div>
                    <div
                        data-matrix-section-target="groupSumContainer"
                        class="d-none py-3"
                    >
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
