<div
    class="accordion-item"
    data-controller="matrix-section"
    data-matrix-section-uid-value="{{ uid }}"
    data-matrix-section-matrix-outlet="[data-controller='matrix']"
>
    <h2 class="accordion-header" id="heading-section-{{ uid }}">
        <button
            class="accordion-button"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#matrix-section-{{ uid }}"
            aria-expanded="true"
            aria-controls="matrix-section-{{ uid }}"
        >
            {{ title }}
        </button>
    </h2>
    <div
        id="matrix-section-{{ uid }}"
        class="accordion-collapse collapse show"
        aria-labelledby="heading-section-{{ uid }}"
    >
        <div class="accordion-body">
            <div class="row">
                <div
                    class="col-4"
                    data-matrix-section-target="expenseList"
                ></div>
                <div class="col-8">
                    <div>
                        <input
                            type="number"
                            min="0"
                            step="1"
                            name="section-member-count-{{ uid }}"
                            data-matrix-section-target="sectionMembersCount"
                            data-action="change->matrix-section#updateMembersCount"
                        />
                    </div>
                    <div data-matrix-section-target="expenseInstanceList"></div>
                    <div
                        data-matrix-section-target="expenseGroupInstanceList"
                    ></div>
                    <div
                        data-matrix-section-target="expenseInstanceTotal"
                    ></div>
                    <div
                        data-matrix-section-target="expenseInstanceGroupTotal"
                    ></div>
                    <div
                        data-matrix-section-target="expenseInstanceMemberTotal"
                    ></div>
                </div>
            </div>
        </div>
    </div>
</div>
