<div
    data-controller="section"
    data-section-budget-outlet="[data-controller='budget']"
>
    <div class="py-4">
        <h3 class="h4 text-center">Liste des Quotients Familiaux</h3>
        <table class="table table-striped table-hover table-bordered">
            <thead>
                <tr>
                    <th class="text-center" scope="col">
                        Libellé <strong class="text-danger">*</strong>
                    </th>
                    <th class="text-center" scope="col">
                        Cotisation Nationale
                        <strong class="text-danger">*</strong>
                    </th>
                    <th class="text-center" scope="col">
                        Coeff multiplisateur
                        <strong class="text-danger">*</strong>
                    </th>
                    <th scope="col" class="text-center">Action</th>
                </tr>
            </thead>
            <tbody data-section-target="sectionList"></tbody>
        </table>
    </div>
    <div>
        <h3 class="h4 text-center">Créer un nouveau Quotient Familial</h3>
        <form
            action=""
            id="section-add-form"
            data-action="submit->section#create"
        >
            <table class="table table-striped table-hover table-bordered">
                <thead>
                    <tr>
                        <th class="text-center" scope="col">
                            Libellé <strong class="text-danger">*</strong>
                        </th>
                        <th class="text-center" scope="col">
                            Cotisation Nationale
                            <strong class="text-danger">*</strong>
                        </th>
                        <th class="text-center" scope="col">
                            Coefficient multiplicateur
                            <strong class="text-danger">*</strong>
                        </th>
                        <th scope="col" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Saisissez ici le libellé du quotient familial"
                                title="Vous devez saisir le libellé du quotient familial"
                                data-section-target="title"
                                required="required"
                            />
                        </td>
                        <td>
                            <input
                                class="form-control w-100 text-end"
                                type="number"
                                min="0"
                                step="1"
                                data-section-target="sectionMembersCount"
                                value="0"
                                required="required"
                            />
                        </td>
                        <td>
                            <input
                                class="form-control w-100 text-end"
                                type="number"
                                min="0"
                                step="1"
                                data-section-target="sectionAdultsCount"
                                value="0"
                                required="required"
                            />
                        </td>
                        <td class="text-end">
                            <button
                                type="submit"
                                class="btn btn-outline-primary text-align-center px-1"
                                title="Ajouter"
                            >
                                <i class="bi bi-floppy"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
    <div class="text-end">
        <strong class="text-danger">*</strong>
        <span class="fst-italic">Champs obligatoires</span>
    </div>
</div>
