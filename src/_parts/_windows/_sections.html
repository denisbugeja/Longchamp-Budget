<div
    data-controller="section"
    data-section-budget-outlet="[data-controller='budget']"
>
    <div data-section-target="sectionList" class="py-4"></div>
    <div>
        <form
            action=""
            id="section-add-form"
            data-action="submit->section#create"
        >
            <div class="row p-4">
                <div class="col-5">
                    <div class="input-group">
                        <span class="input-group-text">Nom</span>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Saisis ici le nom de la section/pôle/section"
                            title="Tu dois saisir le nom de la section/pôle/section"
                            data-section-target="title"
                            required="required"
                        />
                    </div>
                </div>
                <div class="col-2">
                    <div class="input-group">
                        <span class="input-group-text">Enfants/Ados</span>
                        <input
                            class="form-control text-end"
                            type="number"
                            min="0"
                            step="1"
                            data-section-target="sectionMembersCount"
                            value="0"
                            required="required"
                        />
                    </div>
                </div>
                <div class="col-2">
                    <div class="input-group">
                        <span class="input-group-text">Chefs</span>
                        <input
                            class="form-control text-end"
                            type="number"
                            min="0"
                            step="1"
                            data-section-target="sectionAdultsCount"
                            value="0"
                            required="required"
                        />
                    </div>
                </div>
                <div class="col-2">
                    <div class="input-group">
                        <span class="input-group-text">Couleur</span>
                        <input
                            type="color"
                            class="form-control form-control-color"
                            placeholder="Saisis ici la couleur de la section/pôle/sectioné"
                            data-section-target="color"
                            required="required"
                        />
                    </div>
                </div>
                <div class="col-1 d-grid gap-2">
                    <button
                        type="submit"
                        class="w-100 h-100 btn btn-outline-primary text-align-center px-1"
                        title="Ajouter"
                    >
                        <i class="bi bi-floppy"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
