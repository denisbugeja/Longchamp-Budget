<div
    data-controller="section"
    data-section-budget-outlet="[data-controller='budget']"
>
    <div class="py-4">
        <h3 class="h4 text-center">Liste des unités</h3>
        <table class="table table-striped table-hover table-bordered">
            <thead>
                <tr>
                    <th scope="col">Nom</th>
                    <th scope="col">Enfants/Ados</th>
                    <th scope="col">Chefs</th>
                    <th scope="col">Couleur</th>
                    <th scope="col" class="text-end">Action</th>
                </tr>
            </thead>
            <tbody data-section-target="sectionList"></tbody>
        </table>
    </div>
    <div>
        <h3 class="h4 text-center">Créer une nouvelle unité</h3>
        <form
            action=""
            id="section-add-form"
            data-action="submit->section#create"
        >
            <table class="table table-striped table-hover table-bordered">
                <thead>
                    <tr>
                        <th scope="col">Nom</th>
                        <th scope="col">Enfants/Ados</th>
                        <th scope="col">Chefs</th>
                        <th scope="col">Couleur</th>
                        <th scope="col" class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <input
                                type="text"
                                class="form-control"
                                placeholder="Saisis ici le nom de la section/pôle/section"
                                title="Tu dois saisir le nom de la section/pôle/section"
                                data-section-target="title"
                                required="required"
                            />
                        </td>
                        <td>
                            <input
                                class="form-control w-100 text-end"
                                type="number"
                                min="0"
                                step="1"
                                data-section-target="sectionMembersCount"
                                value="0"
                                required="required"
                            />
                        </td>
                        <td>
                            <input
                                class="form-control w-100 text-end"
                                type="number"
                                min="0"
                                step="1"
                                data-section-target="sectionAdultsCount"
                                value="0"
                                required="required"
                            />
                        </td>
                        <td>
                            <input
                                type="color"
                                class="form-control w-100 form-control-color"
                                placeholder="Saisis ici la couleur de la section/pôle/sectioné"
                                data-section-target="color"
                                required="required"
                            />
                        </td>
                        <td class="text-end">
                            <button
                                type="submit"
                                class="btn btn-outline-primary text-align-center px-1"
                                title="Ajouter"
                            >
                                <i class="bi bi-floppy"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</div>
