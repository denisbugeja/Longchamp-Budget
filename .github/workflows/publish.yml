name: "publish"

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+\-rc\[0-9]+'

jobs:
  publish-tauri:
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: longchamp-budget
            binary_extension: ""
            upload_name: longchamp-budget-macos-arm64
          
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            runner: macos-latest
            binary_name: longchamp-budget
            binary_extension: ""
            upload_name: longchamp-budget-macos-intel
          
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: longchamp-budget
            binary_extension: ""
            upload_name: longchamp-budget-linux-x64
          
          - platform: windows-latest
            runner: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
            binary_name: longchamp-budget
            binary_extension: .exe
            upload_name: longchamp-budget.exe

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GH Release (must run ONLY ONCE)
        if: matrix.runner == 'windows-latest'
        run: gh release create v${{ github.ref_name }} --draft --title "v${{ github.ref_name }}" --generate-notes || echo "Release already exists"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-cargo

      - name: Build Binary
        run: |
          cd ./src-tauri
          cargo build --release --target ${{ matrix.target }}

      - name: Upload Binary
        run: |
          $source_path = "./src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary_name }}${{ matrix.binary_extension }}"
          if ("${{ matrix.runner }}" -eq "windows-latest") {
            gh release upload v${{ github.ref_name }} $source_path --clobber
          } else {
            $renamed_path = "./src-tauri/target/${{ matrix.target }}/release/${{ matrix.upload_name }}"
            Move-Item $source_path $renamed_path
            gh release upload v${{ github.ref_name }} $renamed_path --clobber
          }
        shell: pwsh

  publish-final:
      needs: [publish-tauri]
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - name: Make Release Public
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            gh release edit v${{ github.ref_name }} --draft=false